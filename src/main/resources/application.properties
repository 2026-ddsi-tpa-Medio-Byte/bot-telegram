# El bot no expone HTTP: corre como proceso de consola (long-polling a Telegram)
spring.main.web-application-type=none
spring.main.banner-mode=off

# Token del bot de Telegram (obtener de @BotFather). Requerido para arrancar.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}

# URL del módulo Donadores y Entidades (local o Render)
donadores.url=${DONADORES_URL:http://localhost:8080}

logging.level.root=INFO
